name: Douglas Vilar News - Busca Diária de Notícias

on:
  schedule:
    # Executa todos os dias às 04:00 horário de Brasília (07:00 UTC)
    - cron: '0 7 * * *'
  
  # Permite executar manualmente
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar scraper de notícias
        run: |
          cd scripts
          python news_scraper.py
        env:
          TZ: America/Sao_Paulo

      - name: Verificar mudanças
        id: check_changes
        run: |
          git diff --quiet data/news.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit e push das notícias
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Douglas Vilar News Bot"
          git add data/news.json
          git commit -m "📰 Notícias do dia $(date +'%d/%m/%Y') atualizadas automaticamente"
          git push

      - name: Log de resultado
        run: |
          echo "✅ Busca de notícias concluída!"
          echo "📅 Data: $(date +'%d/%m/%Y %H:%M')"
          echo "📂 Arquivo: data/news.json"
          cat data/news.json | python -c "import json,sys; d=json.load(sys.stdin); print(f'📊 Total de notícias: {len(d)}')"
